<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дайджест Бот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color);
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 24px;
        }

        .upload-zone {
            border: 2px dashed var(--tg-theme-button-color, #3390ec);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            margin-bottom: 24px;
        }

        .upload-zone:hover {
            border-color: var(--tg-theme-button-color);
            background: var(--tg-theme-bg-color);
        }

        .upload-zone.dragover {
            background: var(--tg-theme-button-color);
            opacity: 0.1;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
        }

        .file-input {
            display: none;
        }

        .file-info {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }

        .file-info.visible {
            display: block;
        }

        .file-name {
            font-weight: 500;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .file-stats {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
        }

        .settings {
            margin-bottom: 24px;
        }

        .setting-item {
            margin-bottom: 16px;
        }

        .setting-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color);
        }

        .setting-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }

        select.setting-input {
            cursor: pointer;
        }

        .button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button:not(:disabled):hover {
            opacity: 0.9;
        }

        .status {
            text-align: center;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }

        .status.visible {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.loading {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: var(--tg-theme-button-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--tg-theme-hint-color, #e0e0e0);
        }

        .history-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .history-item {
            background: var(--tg-theme-secondary-bg-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .history-empty {
            text-align: center;
            color: var(--tg-theme-hint-color);
            padding: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Генератор дайджестов</h1>
        <p class="subtitle">Создайте красивый дайджест из экспорта Telegram чата</p>

        <!-- Загрузка файла -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Перетащите файл сюда</div>
            <div class="upload-hint">или нажмите для выбора</div>
        </div>
        <input type="file" id="fileInput" class="file-input" accept=".json">

        <!-- Информация о файле -->
        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-stats" id="fileStats"></div>
        </div>

        <!-- Настройки -->
        <div class="settings" id="settings" style="display: none;">
            <div class="setting-item">
                <label class="setting-label">Стиль дайджеста</label>
                <select class="setting-input" id="styleSelect">
                    <option value="default">Живой и человечный</option>
                    <option value="formal">Официальный</option>
                    <option value="motivating">Мотивирующий</option>
                </select>
            </div>

            <div class="setting-item">
                <label class="setting-label">Максимальная длина поста (символов)</label>
                <select class="setting-input" id="lengthSelect">
                    <option value="2500">2500 (рекомендуется)</option>
                    <option value="3000">3000</option>
                    <option value="3500">3500</option>
                </select>
            </div>

            <div class="setting-item">
                <label class="setting-label">Номер дайджеста</label>
                <input type="number" class="setting-input" id="digestNumber" value="1" min="1">
            </div>
        </div>

        <!-- Кнопка создания -->
        <button class="button" id="createButton" disabled>
            Создать дайджест
        </button>

        <!-- Статус -->
        <div class="status" id="status"></div>

        <!-- История -->
        <div class="history">
            <div class="history-title">📚 История</div>
            <div id="historyList">
                <div class="history-empty">История пуста</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
